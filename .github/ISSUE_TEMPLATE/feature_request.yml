name: Feature request
description: Suggest a new routing rule, protocol, or quality gate.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or quality gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest operational rule or output change that would help.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Design strategy
        - Visual polish
        - Accessibility
        - Performance
        - Mobile QA
        - Motion / 3D
        - Playwright verification
        - Documentation
    validations:
      required: true


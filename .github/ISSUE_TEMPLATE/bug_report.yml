name: Bug report
description: Report incorrect, unclear, or unsafe skill behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: invocation
    attributes:
      label: Invocation
      description: Paste the exact request or slash parameters.
      placeholder: "/analyse https://example.com /playwright /performance"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the skill have done?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Framework, UI type, screenshots, or constraints. Do not include private data.
    validations:
      required: false

